<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sunfluence AI Assistant</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("static/12653234.webp") no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 430px;
    height: 640px;
    background: rgba(255,255,255,0.95);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-header {
    padding: 18px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
    background: #fff7ed;
    color: #ea580c;
    border-bottom: 1px solid #eee;
}

.chat-messages {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 75%;
    padding: 12px 16px;
    margin-bottom: 12px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
}

.user {
    align-self: flex-end;
    background: #f97316;
    color: white;
    border-bottom-right-radius: 4px;
}

.bot {
    align-self: flex-start;
    background: #f1f5f9;
    color: #1e293b;
    border-bottom-left-radius: 4px;
}

.chat-input {
    display: flex;
    padding: 15px;
    border-top: 1px solid #eee;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
}

.chat-input button {
    margin-left: 10px;
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    background: #f97316;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.chat-input button:hover {
    background: #ea580c;
}

.loading {
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="chat-container">

    <div class="chat-header">
        ☀ Sunfluence AI Assistant
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about plant performance..." onkeydown="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>
</div>

<script>

function appendMessage(text, className) {
    const chat = document.getElementById("chatMessages");
    const message = document.createElement("div");
    message.className = "message " + className;
    message.innerText = text;
    chat.appendChild(message);
    chat.scrollTop = chat.scrollHeight;
}

function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

function showLoading() {
    const chat = document.getElementById("chatMessages");
    const loading = document.createElement("div");
    loading.className = "loading";
    loading.id = "loadingIndicator";
    loading.innerText = "Analyzing live plant data...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
    const loading = document.getElementById("loadingIndicator");
    if (loading) loading.remove();
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, "user");
    input.value = "";

    showLoading();

    fetch("/ai-chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        removeLoading();
        appendMessage(data.reply, "bot");
    })
    .catch(() => {
        removeLoading();
        appendMessage("Unable to connect to Sunfluence AI service.", "bot");
    });
}

/* Auto greeting on load */
window.onload = function() {
    appendMessage(
        "Welcome to Sunfluence AI Assistant ☀\nHow can I help you today?",
        "bot"
    );
};

</script>

</body>
</html>
